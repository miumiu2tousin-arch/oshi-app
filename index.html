<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>推しカード管理</title>

<style>
  body {
    font-family: "Zen Maru Gothic", sans-serif;
    background: #f4f8ff;
    margin: 0;
    padding: 16px;
    color: #333;
  }

  h1 {
    font-size: 24px;
    color: #5aa0e6;
    margin-bottom: 12px;
  }

  #back-button {
    display: none;
    padding: 10px 14px;
    background: #dcecff;
    border: none;
    border-radius: 10px;
    margin-bottom: 12px;
    color: #3a7bbf;
  }

  #add-button {
    width: 100%;
    padding: 14px;
    background: #7bbcff;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    margin-top: 20px;
  }

  .tile {
    background: white;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .card-img {
    width: 100%;
    border-radius: 6px;
  }

  .card-tile {
    background: white;
    padding: 10px;
    border-radius: 14px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    text-align: center;
  }

  .empty {
    text-align: center;
    color: #8fb3d1;
    margin-top: 40px;
  }

  .detail-img {
    width: 70%;
    display: block;
    margin: 0 auto;
    border-radius: 14px;
  }

  .detail-box {
    background: white;
    padding: 16px;
    border-radius: 16px;
    margin-top: 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  }

  .delete-btn {
    width: 100%;
    padding: 14px;
    background: #ff8b8b;
    color: white;
    border: none;
    border-radius: 14px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1 id="screen-title">グループ一覧</h1>
<button id="back-button" onclick="goBack()">← 戻る</button>
<div id="main-view"></div>
<button id="add-button" onclick="handleAdd()">＋ 追加</button>

<script>
/* -------------------------
   データ保存
------------------------- */
function save() {
  localStorage.setItem("oshiData", JSON.stringify(data));
}
function load() {
  const d = localStorage.getItem("oshiData");
  return d ? JSON.parse(d) : { groups: [] };
}
let data = load();

/* -------------------------
   状態管理
------------------------- */
let currentScreen = "groups";
let currentGroup = null;
let currentMember = null;
let currentCard = null;

/* -------------------------
   画面描画
------------------------- */
function render() {
  const view = document.getElementById("main-view");
  const title = document.getElementById("screen-title");
  const back = document.getElementById("back-button");
  const add = document.getElementById("add-button");

  view.innerHTML = "";
  back.style.display = currentScreen === "groups" ? "none" : "block";

  if (currentScreen === "groups") {
    title.textContent = "グループ一覧";
    add.style.display = "block";
    renderGroups(view);
  }
  if (currentScreen === "members") {
    title.textContent = data.groups[currentGroup].name + " のメンバー";
    add.style.display = "block";
    renderMembers(view);
  }
  if (currentScreen === "cards") {
    title.textContent = data.groups[currentGroup].members[currentMember].name + " のカード";
    add.style.display = "block";
    renderCards(view);
  }
  if (currentScreen === "detail") {
    title.textContent = "カード詳細";
    add.style.display = "none";
    renderDetail(view);
  }
}

/* -------------------------
   戻る
------------------------- */
function goBack() {
  if (currentScreen === "detail") currentScreen = "cards";
  else if (currentScreen === "cards") currentScreen = "members";
  else if (currentScreen === "members") currentScreen = "groups";
  render();
}

/* -------------------------
   追加ボタン
------------------------- */
function handleAdd() {
  if (currentScreen === "groups") addGroup();
  if (currentScreen === "members") addMember();
  if (currentScreen === "cards") addCard();
}

/* -------------------------
   グループ一覧
------------------------- */
function renderGroups(view) {
  if (data.groups.length === 0) {
    view.innerHTML = `<div class="empty">まだグループがありません</div>`;
    return;
  }

  data.groups.forEach((g, i) => {
    const t = document.createElement("div");
    t.className = "tile";
    t.textContent = g.name;
    t.onclick = () => {
      currentGroup = i;
      currentScreen = "members";
      render();
    };
    view.appendChild(t);
  });
}

/* -------------------------
   メンバー一覧
------------------------- */
function renderMembers(view) {
  const group = data.groups[currentGroup];

  if (group.members.length === 0) {
    view.innerHTML = `<div class="empty">まだメンバーがいません</div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  group.members.forEach((m, i) => {
    const t = document.createElement("div");
    t.className = "tile";
    t.textContent = m.name;
    t.onclick = () => {
      currentMember = i;
      currentScreen = "cards";
      render();
    };
    grid.appendChild(t);
  });

  view.appendChild(grid);
}

/* -------------------------
   カード一覧
------------------------- */
function renderCards(view) {
  const member = data.groups[currentGroup].members[currentMember];

  if (member.cards.length === 0) {
    view.innerHTML = `<div class="empty">まだカードがありません</div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  member.cards.forEach((c, i) => {
    const t = document.createElement("div");
    t.className = "card-tile";
    t.innerHTML = `
      <img src="${c.img}" class="card-img">
      <div>${c.name}</div>
      <div>所持：${c.count}</div>
      <div>${c.price}</div>
    `;
    t.onclick = () => {
      currentCard = i;
      currentScreen = "detail";
      render();
    };
    grid.appendChild(t);
  });

  view.appendChild(grid);
}

/* -------------------------
   詳細画面
------------------------- */
function renderDetail(view) {
  const card = data.groups[currentGroup].members[currentMember].cards[currentCard];

  view.innerHTML = `
    <img src="${card.img}" class="detail-img">
    <div class="detail-box">
      <div>カード名：${card.name}</div>
      <div>所持枚数：${card.count}</div>
      <div>最安値：${card.price}</div>
      <button onclick="searchMercari()" class="tile">メルカリで検索</button>
      <button onclick="deleteCard()" class="delete-btn">カードを削除</button>
    </div>
  `;
}

/* -------------------------
   追加処理
------------------------- */
function addGroup() {
  const name = prompt("グループ名を入力");
  if (!name) return;
  data.groups.push({ name, members: [] });
  save();
  render();
}

function addMember() {
  const name = prompt("メンバー名を入力");
  if (!name) return;
  data.groups[currentGroup].members.push({ name, cards: [] });
  save();
  render();
}

function addCard() {
  const name = prompt("カード名を入力");
  if (!name) return;

  const count = Number(prompt("所持枚数")) || 1;

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = () => {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      data.groups[currentGroup].members[currentMember].cards.push({
        name,
        img: e.target.result,
        count,
        price: "未取得"
      });
      save();
      render();
    };
    reader.readAsDataURL(file);
  };

  input.click();
}

/* -------------------------
   削除
------------------------- */
function deleteCard() {
  if (!confirm("削除しますか？")) return;
  data.groups[currentGroup].members[currentMember].cards.splice(currentCard, 1);
  save();
  currentScreen = "cards";
  render();
}

/* -------------------------
   メルカリ検索
------------------------- */
function searchMercari() {
  const m = data.groups[currentGroup].members[currentMember];
  const c = m.cards[currentCard];
  const q = encodeURIComponent(`${m.name} ${c.name}`);
  window.open(`https://www.mercari.com/jp/search/?keyword=${q}`, "_blank");

  const price = prompt("最安値を入力（数字）");
  if (price) {
    c.price = "¥" + price;
    save();
    render();
  }
}

render();
</script>

</body>
</html>

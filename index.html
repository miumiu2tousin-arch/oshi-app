<!DOCTYPE html>
<html lang="ja">
<head>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>推しカード管理</title>

<!-- PWA対応（必要ならそのまま残す） -->
<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

<style>
/* 全体デザイン（丸文字＋背景） */
body {
  font-family: "Zen Maru Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: linear-gradient(180deg, #eaf6ff, #f7fbff);
  background-attachment: fixed;
  margin: 0;
  padding: 15px;
  color: #333;
  position: relative;
}
  
/* キラキラ背景（控えめ） */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.6) 2px, transparent 3px),
    radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 3px);
  background-size: 120px 120px, 200px 200px;
  pointer-events: none;
  opacity: 0.5;
}

/* タイトル */
h1 {
  color: #6bbcff;
  font-size: 26px;
  font-weight: 700;
  text-shadow: 0 2px 4px rgba(150, 200, 255, 0.6);
  margin-bottom: 15px;
}

/* 戻るボタン */
#back-button {
  background: #d8ecff;
  color: #3a7bbf;
  border-radius: 12px;
  padding: 10px 14px;
  width: auto;
  margin-bottom: 12px;
  border: none;
  box-shadow: 0 3px 8px rgba(150, 200, 255, 0.4);
}

/* 追加ボタン */
#add-button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 18px;
  background: linear-gradient(135deg, #9fd8ff, #6bbcff);
  color: white;
  font-size: 18px;
  margin-top: 20px;
  box-shadow: 0 4px 12px rgba(120, 180, 255, 0.5);
}

/* タイル共通（ぷにっと丸い） */
.tile {
  background: white;
  padding: 18px;
  border-radius: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 12px rgba(150, 200, 255, 0.4);
  text-align: center;
  font-size: 18px;
  color: #333;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.tile:active {
  transform: scale(0.97);
}

/* グリッド（4列） */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 10px;
}

/* カードタイル */
.card-tile {
  background: white;
  border-radius: 18px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 4px 12px rgba(150, 200, 255, 0.4);
  cursor: pointer;
  transition: transform 0.15s ease;
}

.card-tile:active {
  transform: scale(0.97);
}

/* カード画像（縦短め） */
.card-img {
  width: 100%;
  border-radius: 4px; /* ← 角丸をほぼ無しに */
  box-shadow: 0 2px 8px rgba(107, 188, 255, 0.2);
}

/* 所持枚数 */
.card-count {
  font-size: 13px;
  color: #6bbcff;
  margin-top: 4px;
}

/* 最安値 */
.card-price {
  font-size: 13px;
  color: #ff7b7b;
  margin-top: 4px;
}

/* 空の画面 */
.empty {
  text-align: center;
  color: #8fb3d1;
  margin-top: 40px;
  font-size: 18px;
}

/* カード詳細画面 */
.detail-img {
  width: 70%;
  margin: 0 auto;
  display: block;
  aspect-ratio: 1 / 1.4;
  object-fit: cover;
  border-radius: 18px;
  background: #e8f4ff;
  box-shadow: 0 4px 12px rgba(150, 200, 255, 0.4);
}

.detail-box {
  background: white;
  padding: 18px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 4px 12px rgba(150, 200, 255, 0.4);
}

.detail-label {
  font-size: 16px;
  color: #6bbcff;
  margin-top: 10px;
}

.detail-value {
  font-size: 18px;
  margin-bottom: 10px;
}

/* 削除ボタン */
.delete-btn {
  background: #ff8b8b;
  color: white;
  padding: 14px;
  border-radius: 16px;
  width: 100%;
  margin-top: 20px;
  border: none;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(255, 150, 150, 0.4);
}

/* かわいいボタン */
button.tile {
  background: #bfe6ff;
  color: #ffffff;
  border: none;
  padding: 14px 22px;
  border-radius: 30px; /* ← 丸くした */
  font-size: 18px;
  font-weight: bold;
  font-family: "Zen Maru Gothic", sans-serif;
  box-shadow: 0 6px 14px rgba(107, 188, 255, 0.35);
  margin: 12px 0;
  width: 90%;
  transition: 0.2s;
}

button.tile:active {
  transform: scale(0.96);
}

/* カード一覧のタイル */
.card-tile {
  background: #ffffff;
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 4px 12px rgba(107, 188, 255, 0.2);
  text-align: center;
}

/* カード画像 */
.card-img {
  width: 100%;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(107, 188, 255, 0.2);
}

/* 全体の文字を太くする */
* {
  font-weight: 700 !important;
  font-family: "Zen Maru Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
}
</style>
</head>

<body>

<!-- ▼ 画面タイトル（動的に変わる） -->
<h1 id="screen-title">グループ一覧</h1>

<!-- ▼ 戻るボタン（最初は非表示） -->
<button id="back-button" style="display:none;" onclick="goBack()">← 戻る</button>

<!-- ▼ メイン表示領域（ここにグループ・メンバー・カードが切り替わって表示される） -->
<div id="main-view"></div>

<!-- ▼ 追加ボタン（画面ごとに役割が変わる） -->
<button id="add-button" onclick="handleAdd()">＋ 追加</button>

<script>
// ======================================================
// データ保存・読み込み
// ======================================================
function save() {
  localStorage.setItem("oshiData", JSON.stringify(data));
}
function load() {
  const saved = localStorage.getItem("oshiData");
  return saved ? JSON.parse(saved) : { groups: [] };
}

let data = load();

// ======================================================
// 階層管理
// ======================================================
let currentScreen = "groups"; // groups / members / cards / detail
let currentGroup = null;
let currentMember = null;
let currentCard = null;

// ======================================================
// 画面切り替え
// ======================================================
function render() {
  const view = document.getElementById("main-view");
  const title = document.getElementById("screen-title");
  const backBtn = document.getElementById("back-button");
  const addBtn = document.getElementById("add-button");

  view.innerHTML = "";

  // 戻るボタン表示制御
  backBtn.style.display = currentScreen === "groups" ? "none" : "block";

  // 画面ごとの描画
  if (currentScreen === "groups") {
    title.textContent = "グループ一覧";
    addBtn.style.display = "block";
    renderGroups(view);
  }

  if (currentScreen === "members") {
    title.textContent = `${data.groups[currentGroup].name} のメンバー`;
    addBtn.style.display = "block";
    renderMembers(view);
  }

  if (currentScreen === "cards") {
    title.textContent = `${data.groups[currentGroup].members[currentMember].name} のカード`;
    addBtn.style.display = "block";
    renderCards(view);
  }

  if (currentScreen === "detail") {
    title.textContent = "カード詳細";
    addBtn.style.display = "none";
    renderCardDetail(view);
  }
}

// ======================================================
// 戻るボタン
// ======================================================
function goBack() {
  if (currentScreen === "detail") currentScreen = "cards";
  else if (currentScreen === "cards") currentScreen = "members";
  else if (currentScreen === "members") currentScreen = "groups";

  render();
}

// ======================================================
// 追加ボタンの動作
// ======================================================
function handleAdd() {
  if (currentScreen === "groups") addGroup();
  if (currentScreen === "members") addMember();
  if (currentScreen === "cards") addCard();
}

// ======================================================
// グループ一覧
// ======================================================
function renderGroups(view) {
  if (data.groups.length === 0) {
    view.innerHTML = `<div class="empty">まだグループがありません</div>`;
    return;
  }

  data.groups.forEach((g, gi) => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = g.name;

    tile.onclick = () => {
      currentGroup = gi;
      currentScreen = "members";
      render();
    };

    // 削除可能条件：メンバー0人
    if (g.members.length === 0) {
      const del = document.createElement("button");
      del.className = "delete-btn";
      del.textContent = "削除";
      del.onclick = (e) => {
        e.stopPropagation();
        if (confirm("このグループを削除しますか？")) {
          data.groups.splice(gi, 1);
          save();
          render();
        }
      };
      tile.appendChild(del);
    }

    view.appendChild(tile);
  });
}

// ======================================================
// メンバー一覧
// ======================================================
function renderMembers(view) {
  const group = data.groups[currentGroup];

  if (group.members.length === 0) {
    view.innerHTML = `<div class="empty">まだメンバーがいません</div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  group.members.forEach((m, mi) => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = m.name;

    tile.onclick = () => {
      currentMember = mi;
      currentScreen = "cards";
      render();
    };

    // 削除可能条件：カード0枚
    if (m.cards.length === 0) {
      const del = document.createElement("button");
      del.className = "delete-btn";
      del.textContent = "削除";
      del.onclick = (e) => {
        e.stopPropagation();
        if (confirm("このメンバーを削除しますか？")) {
          group.members.splice(mi, 1);
          save();
          render();
        }
      };
      tile.appendChild(del);
    }

    grid.appendChild(tile);
  });

  view.appendChild(grid);
}

// ======================================================
// カード一覧
// ======================================================
function renderCards(view) {
  const member = data.groups[currentGroup].members[currentMember];

  if (member.cards.length === 0) {
    view.innerHTML = `<div class="empty">まだカードがありません</div>`;
    return;
  }

  // ▼ まとめ画像ボタンを追加
  const exportBtn = document.createElement("button");
  exportBtn.className = "tile";
  exportBtn.innerText = "まとめ画像を作る";
  exportBtn.onclick = exportMemberCards;
  view.appendChild(exportBtn);

  // ▼ カード一覧
  const grid = document.createElement("div");
  grid.className = "grid";

  member.cards.forEach((c, ci) => {
    const tile = document.createElement("div");
    tile.className = "card-tile";

    tile.innerHTML = `
      <img src="${c.img}" class="card-img">
      <div>${c.name}</div>
      <div class="card-count">所持：${c.count || 1}</div>
      <div class="card-price">${c.price || "未取得"}</div>
    `;

    tile.onclick = () => {
      currentCard = ci;
      currentScreen = "detail";
      render();
    };

    grid.appendChild(tile);
  });

  view.appendChild(grid);
}

// ======================================================
// カード詳細画面
// ======================================================
function renderCardDetail(view) {
  const card = data.groups[currentGroup].members[currentMember].cards[currentCard];

  view.innerHTML = `
    <img src="${card.img}" class="detail-img">

    <div class="detail-box">
      <div class="detail-label">カード名</div>
      <div class="detail-value">${card.name}</div>

      <div class="detail-label">所持枚数</div>
      <div class="detail-value">${card.count || 1}</div>

      <div class="detail-label">最安値</div>
      <div class="detail-value">${card.price || "未取得"}</div>

      <button onclick="searchMercari()" class="tile">メルカリで検索</button>
      <button onclick="deleteCard()" class="delete-btn">カードを削除</button>
    </div>
  `;
}

// ======================================================
// グループ追加
// ======================================================
function addGroup() {
  const name = prompt("グループ名を入力");
  if (!name) return;

  data.groups.push({ name, members: [] });
  save();
  render();
}

// ======================================================
// メンバー追加
// ======================================================
function addMember() {
  const name = prompt("メンバー名を入力");
  if (!name) return;

  data.groups[currentGroup].members.push({ name, cards: [] });
  save();
  render();
}

// ======================================================
// カード追加
// ======================================================
function addCard() {
  const name = prompt("カード名を入力");
  if (!name) return;

  const count = Number(prompt("所持枚数を入力（数字）")) || 1;

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = function () {
    const file = input.files[0];
    const reader = new FileReader();

    reader.onload = function (e) {
      const base64 = e.target.result;

      data.groups[currentGroup].members[currentMember].cards.push({
        name,
        img: base64,
        price: "未取得",
        count
      });

      save();
      render();
    };

    reader.readAsDataURL(file);
  };

  input.click();
}


  
// ======================================================
// カード削除
// ======================================================
function deleteCard() {
  if (!confirm("このカードを削除しますか？")) return;

  data.groups[currentGroup].members[currentMember].cards.splice(currentCard, 1);
  save();

  currentScreen = "cards";
  render();
}

// ======================================================
// メルカリ検索（メンバー名 + カード名）
// ======================================================
function searchMercari() {
  const member = data.groups[currentGroup].members[currentMember];
  const card = member.cards[currentCard];

  const query = encodeURIComponent(`${member.name} ${card.name}`);
  const url = `https://www.mercari.com/jp/search/?keyword=${query}`;

  window.open(url, "_blank");

  const price = prompt("メルカリ最安値を入力（数字のみ）");
  if (price) {
    card.price = "¥" + price;
    save();
    render();
  }
}

// ======================================================
render();

function exportMemberCards() {
  const member = data.groups[currentGroup].members[currentMember];
  const cards = member.cards;

  if (cards.length === 0) {
    alert("カードがありません");
    return;
  }

  // ★ 5列
  const cols = 5;

  // ★ 外枠をさらに狭くして画像を大きく
  const cardBoxW = 200;
  const cardBoxH = 240;

  const rows = Math.ceil(cards.length / cols);

  const canvas = document.createElement("canvas");
  canvas.width = cols * cardBoxW;
  canvas.height = rows * cardBoxH;

  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let index = 0;

  cards.forEach((card) => {
    const img = new Image();
    img.src = card.img;

    img.onload = () => {
      const col = index % cols;
      const row = Math.floor(index / cols);

      const boxX = col * cardBoxW;
      const boxY = row * cardBoxH;

      // ★ 枠（薄ピンク）
      const radius = 14;
      ctx.fillStyle = "#ffeef7";
      roundRect(ctx, boxX + 4, boxY + 4, cardBoxW - 8, cardBoxH - 8, radius);
      ctx.fill();

      ctx.strokeStyle = "#ffc7dd";
      ctx.lineWidth = 2;
      ctx.stroke();

      // ★ 画像を最大限大きく（比率維持）
      const maxW = cardBoxW - 30;
      const maxH = 140;

      let w = img.width;
      let h = img.height;

      const scale = Math.min(maxW / w, maxH / h);
      w *= scale;
      h *= scale;

      const imgX = boxX + (cardBoxW - w) / 2;
      const imgY = boxY + 18;

      ctx.drawImage(img, imgX, imgY, w, h);

      // ★ カード名（太字・大きめ）
      ctx.fillStyle = "#6bbcff";
      ctx.font = "700 18px 'Zen Maru Gothic'";
      ctx.textAlign = "center";
      ctx.fillText(card.name, boxX + cardBoxW / 2, boxY + 200);

      // ★ 所持数バッジ（2枚以上のときだけ）
      if ((card.count || 1) >= 2) {
        ctx.fillStyle = "#6bbcff";
        ctx.beginPath();
        ctx.arc(imgX + w - 10, imgY + 10, 16, 0, Math.PI * 2); // ← 画像に被せる位置
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.font = "700 14px 'Zen Maru Gothic'";
        ctx.textAlign = "center";
        ctx.fillText("×" + card.count, imgX + w - 10, imgY + 15);
      }

      // ★ キラキラ（かわいさUP）
      drawSparkle(ctx, boxX + 25, boxY + 25, 4, "#ffd6f5");
      drawSparkle(ctx, boxX + cardBoxW - 50, boxY + 50, 4, "#ffe2fa");
      drawSparkle(ctx, boxX + 60, boxY + cardBoxH - 50, 5, "#ffccf7");

      index++;

      if (index === cards.length) {
        const url = canvas.toDataURL("image/png");
        const a = document.createElement("a");
        a.href = url;
        a.download = `${member.name}_cards.png`;
        a.click();
      }
    };
  });
}

// ★ キラキラ関数
function drawSparkle(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - size);
  ctx.lineTo(x + size * 0.3, y - size * 0.3);
  ctx.lineTo(x + size, y);
  ctx.lineTo(x + size * 0.3, y + size * 0.3);
  ctx.lineTo(x, y + size);
  ctx.lineTo(x - size * 0.3, y + size * 0.3);
  ctx.lineTo(x - size, y);
  ctx.lineTo(x - size * 0.3, y - size * 0.3);
  ctx.closePath();
  ctx.fill();
}

// ★ 角丸枠
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
</script>

</body>
</html>

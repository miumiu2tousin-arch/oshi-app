<!DOCTYPE html>
<html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>推しカード管理</title>

<style>
  body {
    font-family: "Zen Maru Gothic", system-ui, -apple-system, sans-serif;
    font-weight: 700; /* ← 全体を太字にする */
    background: #f4f8ff;
    margin: 0;
    padding: 16px;
    color: #333;
  }

  h1 {
    font-size: 24px;
    color: #5aa0e6;
    margin-bottom: 12px;
  }

  #back-button {
    display: none;
    padding: 10px 14px;
    background: #dcecff;
    border: none;
    border-radius: 10px;
    margin-bottom: 12px;
    color: #3a7bbf;
  }

  #add-button {
    width: 100%;
    padding: 14px;
    background: #7bbcff;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    margin-top: 20px;
  }

  .tile {
    background: white;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .card-img {
    width: 100%;
    border-radius: 6px;
    background: #e5efff;
  }

  .card-tile {
    background: white;
    padding: 10px;
    border-radius: 14px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    text-align: center;
  }

  .empty {
    text-align: center;
    color: #8fb3d1;
    margin-top: 40px;
  }

  .detail-img {
    width: 70%;
    display: block;
    margin: 0 auto;
    border-radius: 14px;
    background: #e5efff;
  }

  .detail-box {
    background: white;
    padding: 16px;
    border-radius: 16px;
    margin-top: 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  }

  .delete-btn {
    width: 100%;
    padding: 14px;
    background: #ff8b8b;
    color: white;
    border: none;
    border-radius: 14px;
    margin-top: 20px;
  }

  .sort-box {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .sort-box button {
    flex: 1;
    padding: 10px;
    background: #bfe0ff;
    border: none;
    border-radius: 12px;
  }

  .small-btn {
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 8px;
    border: none;
    background: #ffd4d4;
    margin-top: 6px;
  }
</style>
</head>

<body>

<h1 id="screen-title">グループ一覧</h1>
<button id="back-button" onclick="goBack()">← 戻る</button>
<div id="main-view">読み込み中...</div>
<button id="add-button" onclick="handleAdd()">＋ 追加</button>

<script>
/* -------------------------
   IndexedDB 初期化
------------------------- */
let db = null;
let dbReady = false;

const request = indexedDB.open("oshiCardDB", 1);

request.onupgradeneeded = function (event) {
  db = event.target.result;
  if (!db.objectStoreNames.contains("images")) {
    db.createObjectStore("images", { keyPath: "id", autoIncrement: true });
  }
};

request.onsuccess = function (event) {
  db = event.target.result;
  dbReady = true;
  initApp();
};

request.onerror = function () {
  alert("IndexedDB の初期化に失敗しました");
};

/* -------------------------
   IndexedDB 用関数
------------------------- */
function saveImageToDB(base64) {
  return new Promise((resolve, reject) => {
    if (!dbReady) {
      reject("DB not ready");
      return;
    }
    const tx = db.transaction("images", "readwrite");
    const store = tx.objectStore("images");
    const data = { img: base64 };
    const req = store.add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject("画像保存に失敗しました");
  });
}

function loadImageFromDB(id) {
  return new Promise((resolve, reject) => {
    if (!dbReady) {
      reject("DB not ready");
      return;
    }
    const tx = db.transaction("images", "readonly");
    const store = tx.objectStore("images");
    const req = store.get(id);
    req.onsuccess = () => resolve(req.result ? req.result.img : null);
    req.onerror = () => reject("画像読み込みに失敗しました");
  });
}

/* -------------------------
   データ保存（localStorage）
------------------------- */
function save() {
  localStorage.setItem("oshiData", JSON.stringify(data));
}
function load() {
  const d = localStorage.getItem("oshiData");
  return d ? JSON.parse(d) : { groups: [] };
}
let data = { groups: [] };

/* -------------------------
   状態管理
------------------------- */
let currentScreen = "groups";
let currentGroup = null;
let currentMember = null;
let currentCard = null;
let currentSort = "none";

/* -------------------------
   初期化
------------------------- */
function initApp() {
  data = load();
  render();
}

/* -------------------------
   画面描画
------------------------- */
function render() {
  const view = document.getElementById("main-view");
  const title = document.getElementById("screen-title");
  const back = document.getElementById("back-button");
  const add = document.getElementById("add-button");

  view.innerHTML = "";
  back.style.display = currentScreen === "groups" ? "none" : "block";

  if (currentScreen === "groups") {
    title.textContent = "グループ一覧";
    add.style.display = "block";
    renderGroups(view);
  } else if (currentScreen === "members") {
    title.textContent = data.groups[currentGroup].name + " のメンバー";
    add.style.display = "block";
    renderMembers(view);
  } else if (currentScreen === "cards") {
    title.textContent = data.groups[currentGroup].members[currentMember].name + " のカード";
    add.style.display = "block";
    renderCards(view);
  } else if (currentScreen === "detail") {
    title.textContent = "カード詳細";
    add.style.display = "none";
    renderDetail(view);
  }
}

/* -------------------------
   戻る
------------------------- */
function goBack() {
  if (currentScreen === "detail") currentScreen = "cards";
  else if (currentScreen === "cards") currentScreen = "members";
  else if (currentScreen === "members") currentScreen = "groups";
  render();
}

/* -------------------------
   追加ボタン
------------------------- */
function handleAdd() {
  if (currentScreen === "groups") addGroup();
  else if (currentScreen === "members") addMember();
  else if (currentScreen === "cards") addCard();
}

/* -------------------------
   グループ一覧
------------------------- */
function renderGroups(view) {
  if (data.groups.length === 0) {
    view.innerHTML = `<div class="empty">まだグループがありません</div>`;
    return;
  }

  data.groups.forEach((g, i) => {
    const t = document.createElement("div");
    t.className = "tile";
    t.innerHTML = `
      <div>${g.name}</div>
      ${g.members.length === 0 ? `<button class="small-btn" onclick="deleteGroup(${i});event.stopPropagation();">削除</button>` : ""}
    `;
    t.onclick = () => {
      currentGroup = i;
      currentScreen = "members";
      render();
    };
    view.appendChild(t);
  });
}

/* -------------------------
   メンバー一覧
------------------------- */
function renderMembers(view) {
  const group = data.groups[currentGroup];

  if (group.members.length === 0) {
    view.innerHTML = `<div class="empty">まだメンバーがいません</div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  group.members.forEach((m, i) => {
    const t = document.createElement("div");
    t.className = "tile";
    t.innerHTML = `
      <div>${m.name}</div>
      ${m.cards.length === 0 ? `<button class="small-btn" onclick="deleteMember(${i});event.stopPropagation();">削除</button>` : ""}
    `;
    t.onclick = () => {
      currentMember = i;
      currentScreen = "cards";
      render();
    };
    grid.appendChild(t);
  });

  view.appendChild(grid);
}

/* -------------------------
   カード一覧（画像はあとから差し込む）
------------------------- */
function renderCards(view) {
  const member = data.groups[currentGroup].members[currentMember];

  if (!member || !Array.isArray(member.cards) || member.cards.length === 0) {
    view.innerHTML = `<div class="empty">まだカードがありません</div>`;
    return;
  }

  const sortBox = document.createElement("div");
  sortBox.className = "sort-box";
  sortBox.innerHTML = `
    <button onclick="currentSort='name';render()">名前順</button>
    <button onclick="currentSort='price';render()">最安値順</button>
    <button onclick="exportMemberCards()">まとめ画像</button>
  `;
  view.appendChild(sortBox);

  let cards = member.cards.map((c, i) => ({ ...c, _index: i }));

  if (currentSort === "name") {
    cards.sort((a, b) => a.name.localeCompare(b.name, "ja"));
  } else if (currentSort === "price") {
    const toNum = p => p === "未取得" ? 9999999 : Number(p.replace("¥",""));
    cards.sort((a, b) => toNum(a.price) - toNum(b.price));
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  cards.forEach((c) => {
    const t = document.createElement("div");
    t.className = "card-tile";

    const img = document.createElement("img");
    img.className = "card-img";
    img.alt = c.name;

    // 先に枠だけ出す
    t.appendChild(img);

    const nameDiv = document.createElement("div");
    nameDiv.textContent = c.name;
    t.appendChild(nameDiv);

    const countDiv = document.createElement("div");
    countDiv.textContent = `所持：${c.count}`;
    t.appendChild(countDiv);

    const priceDiv = document.createElement("div");
    priceDiv.textContent = c.price;
    t.appendChild(priceDiv);

    t.onclick = () => {
      currentCard = c._index;
      currentScreen = "detail";
      render();
    };

    grid.appendChild(t);

    // 画像はあとから読み込んで差し込む
    if (c.imgID != null) {
      loadImageFromDB(c.imgID).then(dataUrl => {
        if (dataUrl) img.src = dataUrl;
      }).catch(() => {
        img.style.background = "#ccc";
      });
    }
  });

  view.appendChild(grid);
}

/* -------------------------
   詳細画面（画像あとから差し込む）
------------------------- */
function renderDetail(view) {
  const card = data.groups[currentGroup].members[currentMember].cards[currentCard];

  const wrapper = document.createElement("div");

  const img = document.createElement("img");
  img.className = "detail-img";
  img.alt = card.name;
  wrapper.appendChild(img);

  const box = document.createElement("div");
  box.className = "detail-box";
  box.innerHTML = `
    <div>カード名：${card.name}</div>
    <div>所持枚数：${card.count} <button class="small-btn" onclick="editCount()">編集</button></div>
    <div>最安値：${card.price}</div>
    <button onclick="searchMercari()" class="tile">メルカリで検索</button>
    <button onclick="deleteCard()" class="delete-btn">カードを削除</button>
  `;
  wrapper.appendChild(box);

  view.innerHTML = "";
  view.appendChild(wrapper);

  if (card.imgID != null) {
    loadImageFromDB(card.imgID).then(dataUrl => {
      if (dataUrl) img.src = dataUrl;
    }).catch(() => {
      img.style.background = "#ccc";
    });
  }
}

/* -------------------------
   所持枚数編集
------------------------- */
function editCount() {
  const card = data.groups[currentGroup].members[currentMember].cards[currentCard];
  const n = Number(prompt("所持枚数を入力", card.count));
  if (!n) return;
  card.count = n;
  save();
  render();
}

/* -------------------------
   追加処理
------------------------- */
function addGroup() {
  const name = prompt("グループ名を入力");
  if (!name) return;
  data.groups.push({ name, members: [] });
  save();
  render();
}

function addMember() {
  const name = prompt("メンバー名を入力");
  if (!name) return;
  data.groups[currentGroup].members.push({ name, cards: [] });
  save();
  render();
}

function addCard() {
  if (!dbReady) {
    alert("まだ準備中です。少し待ってからもう一度試してください。");
    return;
  }

  const name = prompt("カード名を入力");
  if (!name) return;

  const count = Number(prompt("所持枚数")) || 1;

  const member = data.groups[currentGroup].members[currentMember];
  if (!Array.isArray(member.cards)) {
    member.cards = Object.values(member.cards || {});
  }

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async e => {
      const base64 = e.target.result;
      try {
        const imgID = await saveImageToDB(base64);
        member.cards.push({
          name,
          imgID,
          count,
          price: "未取得"
        });
        save();
        render();
      } catch (err) {
        alert("画像の保存に失敗しました");
      }
    };
    reader.readAsDataURL(file);
  };

  input.click();
}

/* -------------------------
   削除
------------------------- */
function deleteGroup(i) {
  if (!confirm("このグループを削除しますか？")) return;
  data.groups.splice(i, 1);
  save();
  render();
}

function deleteMember(i) {
  if (!confirm("このメンバーを削除しますか？")) return;
  data.groups[currentGroup].members.splice(i, 1);
  save();
  render();
}

function deleteCard() {
  if (!confirm("削除しますか？")) return;
  data.groups[currentGroup].members[currentMember].cards.splice(currentCard, 1);
  save();
  currentScreen = "cards";
  render();
}

/* -------------------------
   メルカリ検索
------------------------- */
function searchMercari() {
  const m = data.groups[currentGroup].members[currentMember];
  const c = m.cards[currentCard];
  const q = encodeURIComponent(`${m.name} ${c.name}`);
  window.open(`https://www.mercari.com/jp/search/?keyword=${q}`, "_blank");

  const price = prompt("最安値を入力（数字）");
  if (price) {
    c.price = "¥" + price;
    save();
    render();
  }
}

/* -------------------------
   まとめ画像生成（画像大きく・余白最小・下部帯＋バッジ）
------------------------- */
async function exportMemberCards() {
  if (!dbReady) {
    alert("まだ準備中です。少し待ってからもう一度試してください。");
    return;
  }

  const member = data.groups[currentGroup].members[currentMember];
  const cards = member.cards;

  if (!cards || cards.length === 0) {
    alert("カードがありません");
    return;
  }

  /* レイアウト設定 */
  const cols = 5;              // 1行の枚数
  const cardW = 210;           // カード幅（さらに大きく）
  const cardH = 280;           // カード高さ（さらに大きく）
  const padding = 2;           // 余白ほぼゼロ
  const rows = Math.ceil(cards.length / cols);

  const canvas = document.createElement("canvas");
  canvas.width = cols * (cardW + padding) - padding;
  canvas.height = rows * (cardH + padding) - padding;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let index = 0; index < cards.length; index++) {
    const card = cards[index];
    if (card.imgID == null) continue;

    const imgData = await loadImageFromDB(card.imgID);
    if (!imgData) continue;

    const img = await new Promise((resolve) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.src = imgData;
    });

    const col = index % cols;
    const row = Math.floor(index / cols);

    const x = col * (cardW + padding);
    const y = row * (cardH + padding);

    /* 画像を最大限大きく表示（下部帯のため少し縮小） */
    const maxW = cardW - 10;
    const maxH = cardH - 60;

    let w = img.width;
    let h = img.height;
    const scale = Math.min(maxW / w, maxH / h);
    w *= scale;
    h *= scale;

    const ix = x + (cardW - w) / 2;
    const iy = y + 5;

    ctx.drawImage(img, ix, iy, w, h);

    /* 下部帯（白の半透明） */
    const bandH = 50;
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fillRect(x, y + cardH - bandH, cardW, bandH);

    /* 名前（左寄せ） */
    ctx.fillStyle = "#4a7fc9";
    ctx.font = "16px 'Zen Maru Gothic'";
    ctx.textAlign = "left";
    ctx.fillText(card.name, x + 10, y + cardH - 20);

    /* 所持数バッジ（角丸四角・右側） */
    const badgeW = 55;
    const badgeH = 28;
    const bx = x + cardW - badgeW - 10;
    const by = y + cardH - bandH + 10;

    ctx.fillStyle = "#7bbcff";
    ctx.beginPath();
    ctx.roundRect(bx, by, badgeW, badgeH, 8);
    ctx.fill();

    ctx.fillStyle = "#ffffff";
    ctx.font = "15px 'Zen Maru Gothic'";
    ctx.textAlign = "center";
    ctx.fillText(`×${card.count}`, bx + badgeW / 2, by + 19);
  }

  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = `${member.name}_cards.png`;
  a.click();
}
</script>

</body>
</html>
